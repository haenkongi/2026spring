<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태백산분지 고생대 화석 아카이브</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-color: #fcfcfc;
            --panel-bg: #ffffff;
            --accent: #c0392b;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow: hidden;
        }

        #side-panel {
            width: 400px;
            background: var(--panel-bg);
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            padding: 30px;
            z-index: 1000;
            overflow-y: auto;
        }

        header h1 { font-size: 1.4rem; margin: 0; font-weight: 800; border-left: 4px solid var(--accent); padding-left: 12px; }
        header p { font-size: 0.85rem; color: #7f8c8d; margin: 8px 0 30px 0; }

        #content-view { display: none; }
        .data-box { margin-bottom: 20px; }
        .label { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .value { font-size: 1rem; line-height: 1.5; font-weight: 600; }
        .description { font-size: 0.9rem; background: #f9f9f9; padding: 15px; border-radius: 6px; border: 1px solid #eee; line-height: 1.6; }

        /* 사진 스타일 */
        #image-box { display: none; margin-bottom: 20px; text-align: center; }
        .fossil-img {
            max-width: 100%;
            max-height: 350px;
            height: auto;
            border-radius: 4px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        #map { flex: 1; height: 100%; cursor: default !important; }
        .welcome-msg { text-align: center; color: #bdc3c7; margin-top: 100px; font-size: 0.9rem; }
    </style>
</head>
<body>

<aside id="side-panel">
    <header>
        <h1>TAEBAEKSAN BASIN</h1>
        <p>태백산분지 고생대 화석 데이터베이스</p>
    </header>

    <div id="welcome" class="welcome-msg">
        <p>지도의 포인트를 클릭하면<br>상세 정보와 사진이 표시됩니다.</p>
    </div>

    <div id="content-view">
        <div id="image-box">
            <span class="label">Fossil Photo</span>
            <img id="v-image" src="" alt="Fossil Photo" class="fossil-img">
        </div>

        <div class="data-box">
            <span class="label">Location</span>
            <div id="v-title" class="value">-</div>
        </div>
        <div class="data-box">
            <span class="label">Stratum / Period</span>
            <div class="value"><span id="v-stratum">-</span> / <span id="v-period">-</span></div>
        </div>
        <div class="data-box">
            <span class="label">Major Fossils</span>
            <div id="v-fossils" class="value">-</div>
        </div>
        <div class="data-box">
            <span class="label">Academic Note</span>
            <div id="v-note" class="description">-</div>
        </div>
    </div>
</aside>

<main id="map"></main>

<script>
    // 1. 지도 초기화 (고정형)
    const map = L.map('map', {
        center: [37.15, 128.75],
        zoom: 11,
        zoomControl: false,
        dragging: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        attributionControl: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    const welcome = document.getElementById('welcome');
    const contentView = document.getElementById('content-view');
    const imageBox = document.getElementById('image-box');
    const vImage = document.getElementById('v-image');

    // 2. data.json 파일 불러오기
    fetch('data.json')
        .then(res => {
            if (!res.ok) throw new Error("JSON 파일을 찾을 수 없습니다.");
            return res.json();
        })
        .then(data => {
            data.forEach(item => {
                // 마커 생성
                const marker = L.circleMarker([item.lat, item.lng], {
                    radius: 8,
                    fillColor: "#c0392b",
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.9,
                    interactive: true
                }).addTo(map);

                // 클릭 이벤트
                marker.on('click', () => {
                    welcome.style.display = 'none';
                    contentView.style.display = 'block';

                    // 텍스트 업데이트
                    document.getElementById('v-title').innerText = item.title || "정보 없음";
                    document.getElementById('v-stratum').innerText = item.stratum || "-";
                    document.getElementById('v-period').innerText = item.period || "-";
                    document.getElementById('v-fossils').innerText = item.fossils || "-";
                    document.getElementById('v-note').innerText = item.note || "등록된 설명이 없습니다.";

                    // 사진 업데이트 로직
                    if (item.image && item.image.trim() !== "") {
                        vImage.src = item.image;
                        imageBox.style.display = 'block';
                    } else {
                        imageBox.style.display = 'none';
                    }
                });

                // 호버 효과
                marker.on('mouseover', function() {
                    this.setRadius(10);
                    this.setStyle({ fillColor: "#e74c3c" });
                });
                marker.on('mouseout', function() {
                    this.setRadius(8);
                    this.setStyle({ fillColor: "#c0392b" });
                });
            });
        })
        .catch(err => {
            console.error(err);
            alert("데이터를 불러오는 데 실패했습니다. data.json 파일을 확인해 주세요.");
        });
</script>

</body>
</html>
